baseurl = "https://happy-island-06a857210.4.azurestaticapps.net/"
title = "Penyadap.web.id"
description = "Aplikasi Penyadap HP iPhone, Android, Blackberry untuk pasangan selingkuh."
copyright = "PENYADAP.WEB.ID. All rights reserved."

enableRobotsTXT = true

debug = 10000

### SETUP
languageCode = "id"
theme = "hugo_framework"
enableEmoji = true
disableHugoGeneratorInject= true
canonifyurls = true
paginate = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = false

[minify]
    [minify.tdewolff.html]
      keepQuotes = true
      keepWhitespace = true

[blackfriday]
  smartypants = false


[related]
  includeNewer = true
  threshold = 100
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100

[outputs]
home = ["HTML", "AMP",  "RSS"]
page = ["HTML", "AMP", "RSS"]


[mediaTypes]
[mediaTypes."application/rss"]
isPlainText = true
suffixes = ["xml"]

[outputFormats]
[outputFormats.RSS]
mediatype = "application/rss"
baseName = "index"


## VENDOR


## TAXTONAMIES

[taxonomies]
  tag = "tags"
  category = "categories"
  label = "label"
  author = "authors"


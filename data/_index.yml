faq:
  id: faqhome
  title: Frequently Asked Questions
  description: |
    Aplikasi penyadap hp pada dasarnya sangat mudah digunakan, 
    hanya membutuhkan dalam beberapa menit untuk siapapun 
    melakukan instalasi dan mulai menggunakannya. 

    Jika pengguna mengalami masalah, atau jika Anda memerlukan penjelasan, 
    maka kami sudah menyediakan beberapa daftar **FAQ** untuk membantu 
    memperjelas, atau bisa hubungi lewat kontak WhatsApp.

    Berikut referensi dari beberapa pertanyaan dasar dan mengenai 
    aplikasi sadap iPhone dan Android kami sediakan.
  list:
    - name: Fungsi penting aplikasi sadap hp?
      number: 1
      buka: true
      text: >
        Aplikasi sadap hp ini sangat unik, flexibel dan mudah digunakan, memiliki 
        kompatibilitas dengan sistem mobile Android dan iOS, dengan fitur 
        mode siluman sehingga target tidak akan mengetahui mengenai kegiatan 
        monitoring pada ponsel seseorang, untuk merekam dan mengirimkan semua data 
        komunikasi lewat aplikasi monitoring, asal perangkat target terkoneksi 
        dengan internet.
      
    - name: Benefit menggunakan aplikasi sadap hp?
      number: 2
      buka: true
      text: >
        Curiga pasangan selingkuh dan ingin mengawasi? untuk mendapatkan
        informasi tentang bagaimana obrolan chat dari ponsel pasangan Anda!,
        dengan memanfaatkan aplikasi penyadap hp, dengan mudah mengetahui
        tentang aktivitas komunikasi rahasia fungsi lain untuk memantau ponsel
        anak dan karyawan yang mungkin membantu perusahaan, maka Anda perlu
        menggunakan aplikasi monitoring untuk membantu mendapatkan informasi
        rahasia dari hp seseorang.

    - name: Apakah aplikasi sadap dapat terdeteksi?
      number: 3
      buka: true
      text: >
        Aplikasi tidak menampilkan tanda icon pada smartphone, 
        target tidak akan mengetahui tentang aktivitas monitoring 
        bahwa hp sedang dalam pengawasan Anda.

        Jadi aplikasi sadap hp tidak akan muncul pada tampilan menu hp 
        (mode siluman: tergantung pada konfigurasi, beberapa 
        tipe smartphone memerlukan rooting).

    - name: Cara mengetahui kalau aplikasi, mendukung di hp target?
      number: 4
      buka: true
      text: >
        Kami memiliki penjelasan diatas yang sudah disiapkan untuk memastikan
        ini.

        Aplikasi ini telah digunakan oleh ribuan orang sehingga menjadi
        bukti bahwa aplikasi sadap bekerja dengan sangat baik, dan benar-benar
        bekerja pada berbagai platform Android versi 4 sampai versi terbaru,
        untuk iOS tersedia untuk versi 7 sampai versi terbaru iOS.

    - name: Memastikan aplikasi bekerja seperti yang diinginkan?
      number: 5
      buka: true
      text: >
        Lihat testimoni kami dari diatas dari klien yang telah menggunakan
        perangkat sadap ini, kami telah membangun reputasi menyeluruh mengenai
        fungsionalitas dan layanan aplikasi penyadap hp sebaik mungkin.

        Atau bisa hubungi kami untuk data hasil sadap dari smartphone uji coba.

    - name: Apakah penyadap hp sesuai dengan kebutuhan saya?
      number: 6
      buka: true
      text: >
        Melalui tanggapan yang diberikan tentang produk sadap ini dan buktikan
        sendiri bagaimana klien kami memanfaatkan penyadap untuk kerperluan
        pengawasan dalam lingkup terbatas, seperti contoh keluarga.

        Aplikasi sadap hp berguna bagi Anda yang ingin mengawasi anak 
        yang terlibat dalam kegiatan dan penggunaan "berbahaya" dan dapat 
        dicegah secara cepat dan tepat waktu.

    - name: Apakah aplikasi sadap hp dapat diandalkan?
      number: 7
      buka: true
      text: >
        Setiap tanggapan pelanggan berbeda-beda, semua yang telah menggunakan
        aplikasi sadap ini benar - benar sangat puas, juga mencakup dukungan
        teknis yang kami berikan kepada pengguna yang berlangganan.

    - name: Pusat bantuan, saat saya mengalami kendala?
      number: 8
      buka: true
      text: >
        Kami selalu merespon dukungan secara online melalui obrolan chat atau
        melalui email atau via WhatsApp.

        Jika tidak merasa puas, untuk menghubungi kami melalui telpon 
        kapan saja dan kami menjamin respon secepat mungkin.

    - name: Aplikasi dapat uji coba di ponsel sendiri?
      number: 9
      buka: true
      text: >
        Apabila sebelumnya belum pernah menggunakan aplikasi sadap hp, kami 
        sangat rekomendasikan untuk dipasang di ponsel milik sendiri terlebih
        dahulu.

        Apabila sudah mengerti penggunaan aplikasi penyadap, yang perlu
        dilakukan adalah menghubungi tim teknis kami, akan dibantu
        dalam proses ini dalam pemindahan ke ponsel lain.

    - name: Target ganti hp? dapatkah saya memindahkan hp lain?
      number: 10
      buka: true
      text: >
        Tentunya, jika ini terjadi, Anda hanya perlu menghubungi teknisi kami
        dan akan membantu beralih ke perangkat smartphone target yang baru.

        Dengan cara yang sama dari saat pengujian aplikasi sadap di perangkat
        sendiri, mungkin ada perbedaan konfigurasi dari masing-masing hp.

    - name: Hp target tidak terpasang kartu sim selular
      number: 11
      buka: true
      text: >
        Tidak masalah bila ponsel target tidak menggunakan kartu sim, aplikasi sadap 
        masih tetap bisa melakukan peyadapan data WhatsApp dan Panggilan
        Suara (catatan: pastikan ponsel terget masih terhubung dengan koneksi
        internet)

    - name: Bagaimana proses pengiriman aplikasi?
      number: 12
      buka: true
      text: |
        Setelah proses pemesanan selesai, kami akan kirim melalui email setelah
        itu serta panduan pemasangan. Proses hanya akan membutuhkan proses 
        dalam beberapa menit saja, lihat lebih lanjut hubungi kami untuk 
        keterangan lebih detail terkait fitur dan fungsi dari aplikasi monitoring.

    - name: Bagaimana metode pembayaran?
      number: 13
      buka: true
      text: |
        Untuk opsi pembayaran saat ini hanya tersedia lewat bank tranfer saja.

    - name: Apakah aplikasi dapat ditampilkan di menu?
      number: 14
      buka: true
      text: >
        Bisa, kekurangannya aplikasi sadap hp akan terlihat di dalam tampilan
        menu utama ponsel target.

        Tapi juga dapat disembunyikan (mungkin beberapa tipe Android
        memerlukan rooting untuk membunyikan icon pada tempilan menu)

    - name: Langkah pertama berhasil, langkah selanjutnya?
      number: 15
      buka: true
      text: >
        Setelah pembayaran berhasil, Anda akan segera menerima email dari 
        kami, yang akan memberi keterangan info tentang rincian akun.

        Dan prosedur aktivasi dan pedoman pemasangan, ikuti 
        langkah-langkah dan mulai memantau komunikasi perangkat 
        target dalam waktu singkat.

        Anda juga akan menerima pemberitahuan dari setiap fungsi 
        dari fitur sadap hp. 

        Aplikasi akan dikirimkan ke email pribadi saja, dari data 
        informasi pemesanan, setiap data pribadi tidak akan kami 
        publikasikan pada halaman atau situs manapun, tanpa seizin Anda.





<h4>GPU (Unit pemroses grafis)</h4>
<p>
Unit pemroses grafis ataupun Graphics processing unit ataupun GPU( ataupun biasa pula diucap visual processing unit ataupun VPU) merupakan suatu prossesor spesial buat buat bagian grafis 3D dari microprocessor. Perlengkapan ini digunakan di sistem benam, telepon genggam, pc individu, workstation, serta konsol permainan. GPU Modern sangat efektif dalam memanipulasi pc grafis serta struktur paralel, buatnya lebih efisien dari guna universal CPU yang digunakan buat bebagai perhitungan alogaritma. Pada pc individu( Komputer), GPU umumnya ada di video card ataupun di motherboard. Lebih dari pc desktop serta notebook memiliki GPU yang terintegrasi, yang umumnya jauh daripada yang terdapat di video card. 
</p>

Source / Sumber : <a href="https://id.wikipedia.org/wiki/Unit_pemroses_grafis">https://id.wikipedia.org/wiki/Unit_pemroses_grafis</a>

os="""
<div class="card mb-5 mt-5">
   <div class="card-body container">
      <h4>OS Platfrom (Operasi Sistem)</h4>

      <p>Umumnya, sebutan sistem operasi kerap diperuntukan kepada seluruh fitur lunak yang masuk dalam satu paket dengan sistem pc saat sebelum aplikasi- aplikasi fitur lunak terinstal. Sistem operasi merupakan fitur lunak sistem yang bertugas buat melaksanakan kontrol serta manajemen fitur keras dan operasi- operasi dasar sistem, tercantum melaksanakan fitur lunak aplikasi semacam program- program pengolah kata serta peramban website. </p>

      <p>Dalam banyak permasalahan, Sistem Operasi sediakan sesuatu pustaka dari fungsi- fungsi standar, di mana aplikasi lain bisa memanggil fungsi- fungsi itu, sehingga dalam tiap pembuatan program baru, tidak butuh membuat fungsi- fungsi tersebut dari dini. </p>

      <p>Sistem operasi secara universal terdiri dari sebagian bagian: </p>

      <ul>
         <li>Mekanisme Boot, ialah meletakkan kernel ke dalam memory RAM</li>
         <li>Kernel, ialah inti dari sebuah sistem operasi</li>
         <li>Command Interpreter ataupun shell, yang bertugas membaca / read input dari pengguna</li>
         <li>Pustaka-pustaka, yaitu yang menyediakan kumpulan fungsi dasar dan standar yang dapat dipanggil oleh aplikasi lain</li>
         <li>Driver untuk berinteraksi dengan hardware eksternal, sekaligus untuk mengendalikannya.</li>
      </ul>

      Source / Sumber : <a href="https://id.wikipedia.org/wiki/Sistem_operasi">https://id.wikipedia.org/wiki/Sistem_operasi</a>
   </div>
</div>

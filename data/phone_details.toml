chipset="""
<div class="card mb-5 mt-5">
   <div class="card-body container">
<h4>Chipset</h4>
<p>Suatu chipset memusatkan informasi dari CPU ke Chipset. Sebaliknya Chipset dipecah jadi 2 bagian komponen utama ialah, Northbridge serta Southbridge. Northbridge mengendalikan Chace memori, Memori Utama, Host Bis serta Slot PCI perluasan. Sebaliknya Soutbridge mengendalikan ISA Bis, serta menjembatani antara ISA Bis serta PCI Bis, mengendalikan serta mengendalikan I/ O port serta slot Ilham. Chipset pula memastikan kecepatan dari front- side bis, bis memory serta bis grafis, dan kapasitas serta jenis memori yang di dukung motherboard. Tidak hanya itu pula, chipset memusatkan aliran informasi lewat bis PCI, drive Ilham serta port I/ O dan memastikan standar Ilham pula jenis port yang didukung oleh sistem.</p>

 Source / Sumber : <a href="https://id.wikipedia.org/wiki/Chipset">https://id.wikipedia.org/wiki/Chipset</a>
 </div>
</div>

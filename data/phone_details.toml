cpu="""
<div class="card mb-5 mt-5">
   <div class="card-body container">
<h4>CPU (Unit Pemroses Sentral)</h4>
<p>
CPU berperan semacam kalkulator, cuma saja CPU jauh lebih kokoh energi pemrosesannya. Guna utama dari CPU merupakan melaksanakan pembedahan aritmetika serta logika terhadap informasi yang diambil dari memori ataupun dari data yang dimasukkan lewat sebagian fitur keras, semacam papan tombol, pemindai, tuas kontrol, ataupun tetikus. CPU dikontrol memakai sekumpulan instruksi fitur lunak pc. Fitur lunak tersebut bisa dijalankan oleh CPU dengan membacanya dari media penyimpan, semacam cakram keras, disket, cakram padat, ataupun pita perekam. Instruksi- instruksi tersebut setelah itu ditaruh terlebih dulu pada memori raga( MAA), yang mana tiap instruksi hendak diberi alamat unik yang diucap alamat memori. Berikutnya, CPU bisa mengakses data- data pada MAA dengan memastikan alamat informasi yang dikehendaki. 
</p>

Source / Sumber : <a href="https://id.wikipedia.org/wiki/Unit_Pemroses_Sentral">https://id.wikipedia.org/wiki/Unit_Pemroses_Sentral</a>
 </div>
</div>
